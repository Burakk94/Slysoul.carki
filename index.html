<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Slysoul Vadi Çarkı - KAOS EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --lol-gold: #c8aa6e; --lol-blue: #0ac8b9; --kaos-red: #ff4d4d; }
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.alphacoders.com/132/1325455.png');
            background-size: cover; background-attachment: fixed; color: #f0e6d2;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .header { text-align: center; border-bottom: 2px solid var(--kaos-red); margin-bottom: 20px; padding-bottom: 10px; }
        .wheel-box { position: relative; width: 320px; height: 320px; margin-bottom: 25px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--kaos-red); box-shadow: 0 0 30px rgba(255, 77, 77, 0.4); transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--kaos-red); z-index: 10; }
        
        button { padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 4px; border: 2px solid var(--lol-gold); text-transform: uppercase; transition: 0.2s; }
        #spinBtn { background: linear-gradient(to bottom, #ff4d4d, #990000); color: white; font-size: 1.2rem; border-color: white; }
        #downloadBtn { background: transparent; color: var(--lol-blue); display: none; border-color: var(--lol-blue); margin-left: 10px; }
        
        #captureArea {
            display: none; background: rgba(5, 5, 10, 0.95); border: 2px solid var(--kaos-red);
            padding: 25px; border-radius: 10px; max-width: 850px; width: 100%; margin-top: 25px;
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.2);
        }
        .result-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .champ-header { text-align: center; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .champ-img { width: 90px; border-radius: 50%; border: 3px solid var(--kaos-red); filter: grayscale(20%) contrast(120%); }

        .rune-path { background: rgba(30,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid #422; }
        .rune-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
        .rune-img { width: 28px; height: 28px; border-radius: 50%; }
        .rune-img.keystone { width: 45px; height: 45px; border: 2px solid var(--kaos-red); box-shadow: 0 0 10px var(--kaos-red); }
        
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-box { text-align: center; font-size: 10px; background: rgba(0,0,0,0.6); padding: 8px; border: 1px solid #333; border-radius: 6px; }
        .item-img { width: 50px; height: 50px; margin-bottom: 5px; border: 1px solid #444; }
        .kaos-text { color: var(--kaos-red); font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="kaos-text">SLYSOUL KAOS ÇARKI</h1>
        <p id="status" style="color: #888;">Kaos için veriler toplanıyor...</p>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div>
        <button id="spinBtn" disabled>YÜKLENİYOR...</button>
    </div>

    <div id="captureArea">
        <div class="champ-header">
            <img id="cImg" class="champ-img">
            <h2 id="cName" style="color: var(--kaos-red); margin: 5px 0; text-transform: uppercase;"></h2>
            <div id="cRole" style="font-size: 12px; color: #888; font-style: italic;"></div>
            <div style="color: var(--kaos-red); font-weight: bold; margin-top: 5px;">[ KAOS DİZİLİMİ ]</div>
        </div>

        <div class="result-layout">
            <div class="rune-path">
                <h3 style="color: var(--lol-blue); font-size: 14px; margin-top: 0;">KAOTİK RÜN SAYFASI</h3>
                <div id="mainRuneArea"></div>
                <div id="subPathName" style="margin-top:15px; color:var(--kaos-red); font-size:12px; border-top:1px solid #444; padding-top:10px;"></div>
                <div id="subRuneArea" style="margin-top: 5px;"></div>
                <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
                    <div style="width:15px; height:15px; border-radius:50%; background:white; box-shadow: 0 0 5px white;"></div>
                    <div style="width:15px; height:15px; border-radius:50%; background:white; box-shadow: 0 0 5px white;"></div>
                    <div style="width:15px; height:15px; border-radius:50%; background:white; box-shadow: 0 0 5px white;"></div>
                </div>
            </div>

            <div>
                <h3 style="color: var(--lol-blue); font-size: 14px; margin-top: 0;">KARIŞIK EŞYA SETİ</h3>
                <div class="item-grid" id="itemList"></div>
            </div>
        </div>
    </div>

    <script>
        let champions = [], mainItems = [], boots = [], runes = [], version = "";
        let currentRotation = 0;

        async function init() {
            try {
                const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
                version = (await vRes.json())[0];

                const [cData, iData, rData] = await Promise.all([
                    fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/tr_TR/champion.json`).then(r => r.json()),
                    fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/tr_TR/item.json`).then(r => r.json()),
                    fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/tr_TR/runesReforged.json`).then(r => r.json())
                ]);

                champions = Object.values(cData.data);
                runes = rData;

                // EŞYA FİLTRESİ: Sadece şu an mağazada olan bitmiş eşyalar
                mainItems = Object.values(iData.data).filter(i => 
                    i.gold.total > 2200 && i.maps["11"] && !i.requiredAlly && !i.into && i.inStore !== false
                );

                boots = Object.values(iData.data).filter(i => 
                    i.tags.includes("Boots") && i.gold.total > 500 && i.maps["11"]
                );

                drawWheel();
                document.getElementById('status').innerText = `KAOS MODU AKTİF (Yama ${version})`;
                document.getElementById('spinBtn').innerText = "ÇARKI ÇEVİR";
                document.getElementById('spinBtn').disabled = false;
            } catch (e) { document.getElementById('status').innerText = "Vadi çöktü!"; }
        }

        function drawWheel() {
            const ctx = document.getElementById('wheelCanvas').getContext('2d');
            const num = 18;
            for(let i=0; i<num; i++) {
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? "#1a0000" : "#000000";
                ctx.moveTo(250, 250); ctx.arc(250, 250, 250, i*(Math.PI*2/num), (i+1)*(Math.PI*2/num));
                ctx.fill();
                ctx.save(); ctx.translate(250, 250); ctx.rotate(i*(Math.PI*2/num) + (Math.PI/num));
                ctx.fillStyle = "#ff4d4d"; ctx.font = "bold 10px Segoe UI";
                ctx.fillText(champions[Math.floor(Math.random()*champions.length)].name, 140, 5); ctx.restore();
            }
        }

        document.getElementById('spinBtn').addEventListener('click', () => {
            currentRotation += Math.floor(Math.random() * 360) + 4000;
            document.getElementById('wheelCanvas').style.transform = `rotate(${currentRotation}deg)`;
            document.getElementById('captureArea').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            setTimeout(showResult, 5200);
        });

        function showResult() {
            const champ = champions[Math.floor(Math.random() * champions.length)];
            const isADC = champ.tags.includes("Marksman");
            
            document.getElementById('cName').innerText = champ.name;
            document.getElementById('cImg').src = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${champ.id}.png`;
            document.getElementById('cRole').innerText = "Asıl Rolü: " + champ.tags.join(" / ");

            // RÜN KAOSU
            const mainTree = runes[Math.floor(Math.random() * runes.length)];
            let subTree = runes[Math.floor(Math.random() * runes.length)];
            while(subTree.id === mainTree.id) subTree = runes[Math.floor(Math.random() * runes.length)];

            let mainHtml = "";
            mainTree.slots.forEach((slot, i) => {
                const r = slot.runes[Math.floor(Math.random() * slot.runes.length)];
                mainHtml += `<div class="rune-row"><img class="rune-img ${i==0?'keystone':''}" src="https://ddragon.leagueoflegends.com/cdn/img/${r.icon}"> <span>${r.name}</span></div>`;
            });
            document.getElementById('mainRuneArea').innerHTML = mainHtml;

            document.getElementById('subPathName').innerText = "DİSİPLİN: " + subTree.name;
            let subRunes = [];
            const shuffledSlots = [...subTree.slots].slice(1).sort(() => 0.5 - Math.random());
            shuffledSlots.slice(0, 2).forEach(slot => {
                const r = slot.runes[Math.floor(Math.random() * slot.runes.length)];
                subRunes.push(`<div class="rune-row"><img class="rune-img" src="https://ddragon.leagueoflegends.com/cdn/img/${r.icon}"> <span>${r.name}</span></div>`);
            });
            document.getElementById('subRuneArea').innerHTML = subRunes.join("");

            // EŞYA KAOSU
            let itemHtml = "";
            const selItems = [...mainItems].sort(() => 0.5 - Math.random()).slice(0, isADC ? 6 : 5);
            selItems.forEach(it => {
                itemHtml += `<div class="item-box"><img class="item-img" src="https://ddragon.leagueoflegends.com/cdn/${version}/img/item/${it.image.full}"><br>${it.name}</div>`;
            });
            const boot = boots[Math.floor(Math.random() * boots.length)];
            itemHtml += `<div class="item-box" style="border-color:var(--kaos-red)"><img class="item-img" src="https://ddragon.leagueoflegends.com/cdn/${version}/img/item/${boot.image.full}"><br><b>${boot.name}</b></div>`;
            document.getElementById('itemList').innerHTML = itemHtml;

            document.getElementById('captureArea').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'inline-block';
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            html2canvas(document.getElementById('captureArea'), { backgroundColor: '#05050a' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Slysoul_Kaos_${document.getElementById('cName').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        });

        init();
    </script>
</body>
</html>
